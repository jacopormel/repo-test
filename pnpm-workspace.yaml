onlyBuiltDependencies:
  - '@scarf/scarf'
  - protobufjs
  - unrs-resolver

# Distintos paquetes @pormeldev/axis-* fijan versiones exactas distintas de
# axis-common-lib (2.0.0 / 2.0.1 / 2.1.0), sin ^. Sin este override, pnpm
# instala copias separadas y TypeScript trata clases con campos privados
# (Id, QueryDto, etc.) de cada copia como tipos incompatibles entre sí.
# Forzamos una única versión compartida (2.1.0, la más nueva, backward-compatible
# por semver) para que todo el árbol de dependencias vea la misma instancia.
overrides:
  '@pormeldev/axis-common-lib': '2.1.0'
