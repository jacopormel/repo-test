name: gubernamentales-backend

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_MASTER_USERNAME:-gubernamentales}
      POSTGRES_PASSWORD: ${DB_MASTER_PASSWORD:-gubernamentales_dev}
      POSTGRES_DB: ${DB_MASTER_DATABASE:-gubernamentales}
      TZ: UTC
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    ports:
      - "${DB_MASTER_PORT:-5432}:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - redis-data:/data
    networks:
      - app-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
      secrets:
        - github_pat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Dentro de la red de docker compose, el host es el nombre del servicio,
      # no localhost (que en .env apunta al puerto publicado para dev local).
      DB_MASTER_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "${APP_PORT:-3000}:${APP_PORT:-3000}"
    volumes:
      # Código fuente del host, para que nodemon detecte los cambios y reinicie.
      - .:/app
      # Volumen dedicado: evita que el bind mount de arriba pise el
      # node_modules instalado dentro del container (Linux) con el del host.
      - api-node-modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

volumes:
  pg-data:
  redis-data:
  api-node-modules:

networks:
  app-network:

secrets:
  github_pat:
    environment: GITHUB_PAT
