version: "3.8"

services:
  db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle
    restart: unless-stopped
    environment:
      - ORACLE_PASSWORD=${DB_MASTER_PASSWORD}
      - APP_USER=${DB_MASTER_USERNAME}
      - APP_USER_PASSWORD=${DB_MASTER_PASSWORD}
      - TZ=UTC
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "echo 'select 1 from dual;' | sqlplus -s system/$$ORACLE_PASSWORD@//localhost:1521/XEPDB1 || exit 1",
        ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    ports:
      - "${DB_MASTER_PORT:-1521}:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - redis-data:/data
    networks:
      - app-network

volumes:
  oracle-data:
  redis-data:

networks:
  app-network:
